<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Business Profile Setup - Suchi's Chai Trail</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#075E54",
                    "primary-dark": "#075E54",
                    "on-primary": "#ffffff",
                    "surface": "#f9f9f9",
                    "background": "#f9f9f9",
                    "on-surface": "#1a1c1c",
                    "on-surface-variant": "#667781",
                    "outline-variant": "#d1d7db",
                    "surface-container": "#ffffff",
                    "surface-container-low": "#f3f3f4",
                    "surface-container-high": "#e8e8e8",
                    "primary-container": "#075E54",
                    "on-primary-container": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "8px",
                    "lg": "10px",
                    "xl": "12px",
                    "full": "9999px"
            },
            "spacing": {
                    "md": "16px",
                    "margin-desktop": "40px",
                    "xl": "32px",
                    "base": "4px",
                    "margin-mobile": "16px",
                    "gutter": "16px",
                    "sm": "8px",
                    "lg": "24px",
                    "xs": "4px"
            },
            "fontFamily": {
                    "body-lg": ["Inter", "sans-serif"],
                    "headline-lg-mobile": ["Plus Jakarta Sans", "sans-serif"],
                    "headline-lg": ["Plus Jakarta Sans", "sans-serif"],
                    "label-sm": ["Inter", "sans-serif"],
                    "label-md": ["Inter", "sans-serif"],
                    "body-md": ["Inter", "sans-serif"],
                    "headline-md": ["Plus Jakarta Sans", "sans-serif"]
            },
            "fontSize": {
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "headline-lg": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                    "label-sm": ["11px", {"lineHeight": "16px", "letterSpacing": "0.03em", "fontWeight": "500"}],
                    "label-md": ["13px", {"lineHeight": "18px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ai-glow {
            box-shadow: 0 0 15px rgba(7, 94, 84, 0.2);
        }
        .pulse-border {
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { border-color: rgba(7, 94, 84, 0.3); }
            50% { border-color: rgba(7, 94, 84, 1); }
            100% { border-color: rgba(7, 94, 84, 0.3); }
        }
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .animate-bounce-subtle {
            animation: bounce-subtle 3s ease-in-out infinite;
        }
        body {
            min-height: 100dvh;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        h1, h2, h3, .font-jakarta {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-surface text-on-surface flex flex-col h-screen">
<div class="w-full h-11 flex items-end justify-between px-6 bg-primary text-white pb-1.5 shrink-0">
<span class="text-[15px] font-semibold">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined !text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined !text-[18px]">wifi</span>
<span class="material-symbols-outlined !text-[18px]">battery_full</span>
</div>
</div>
<header class="sticky top-0 z-50 flex items-center w-full px-4 h-14 bg-primary text-white shadow-sm shrink-0">
<div class="flex items-center w-full justify-between">
<div class="flex items-center gap-3">
<button class="hover:bg-white/10 transition-colors duration-200 active:opacity-70 p-1 rounded-full">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-jakarta font-bold">Business Profile</h1>
</div>
<div class="flex items-center gap-2 bg-black/20 px-2.5 py-1 rounded-full">
<span class="text-[10px] font-bold uppercase tracking-wider opacity-90">AI TIPS</span>
<div class="w-7 h-4 bg-[#25D366] rounded-full relative">
<div class="absolute right-0.5 top-0.5 w-3 h-3 bg-white rounded-full"></div>
</div>
</div>
</div>
</header>
<div class="w-full bg-white py-3 px-4 border-b border-outline-variant shrink-0">
<div class="flex justify-between items-center mb-2">
<span class="text-label-md text-on-surface-variant font-medium">Setup Progress</span>
<span class="text-label-md font-bold text-primary">Step 2 of 5</span>
</div>
<div class="w-full h-1 bg-surface-container-high rounded-full overflow-hidden">
<div class="w-2/5 h-full bg-[#25D366] rounded-full"></div>
</div>
</div>
<main class="flex-1 px-4 py-6 overflow-y-auto space-y-6">
<section class="flex flex-col items-center">
<div class="relative group cursor-pointer">
<div class="w-24 h-24 rounded-full bg-surface-container-high flex items-center justify-center border-2 border-dashed border-outline-variant hover:border-primary transition-colors overflow-hidden">
<div class="w-full h-full bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDyNKSili8kjMdBp4mBHMMmVMIEKucxV02UO2caswWwJIS7T2dOAoexzW0KDtNfd5-NOHJL_Sbg-_pUekksdiWlekTp9c0uy-4ruo3FHlsR9KdkOvlLd-sZvF6_z93z1pPrnj8GTuA0tEkXZ434FBpP46p44Rt4OJAY9ELBdgBOlGDrGe31fNYEJU-JzzKAIEokxm-zWpeDDQmqNkDdVwnJLeRYdp8NBBBS1_hyz2KGVq9E9Er94YSb')"></div>
</div>
<div class="absolute bottom-0 right-0 bg-primary text-white p-1.5 rounded-full shadow-lg border-2 border-white">
<span class="material-symbols-outlined !text-[18px]">photo_camera</span>
</div>
</div>
<p class="mt-2 text-label-md text-on-surface-variant font-medium">Update Business Logo</p>
</section>
<div class="space-y-6">
<div class="space-y-1.5">
<label class="font-jakarta text-label-md text-on-surface-variant px-1">Business Name</label>
<input class="w-full h-12 px-4 rounded-xl border-outline-variant border focus:border-primary focus:ring-0 text-body-lg bg-white transition-all" type="text" value="Suchi's Chai Trail"/>
</div>
<div class="relative">
<div class="space-y-1.5">
<label class="font-jakarta text-label-md text-on-surface-variant px-1">Category</label>
<div class="relative">
<select class="w-full h-12 px-4 pr-12 rounded-xl border pulse-border ai-glow focus:border-primary focus:ring-0 text-body-lg bg-white appearance-none transition-all">
<option>Select a category</option>
<option selected="">Cafe &amp; Tea</option>
<option>Restaurant</option>
<option>Food Delivery</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-3 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
<div class="absolute -top-14 right-0 left-0 flex justify-center pointer-events-none">
<div class="bg-primary text-white px-4 py-2.5 rounded-xl shadow-lg flex items-start gap-3 pointer-events-auto max-w-[280px] animate-bounce-subtle border border-white/20">
<span class="material-symbols-outlined !text-[18px] mt-0.5">lightbulb</span>
<div class="flex-1">
<p class="text-[12px] leading-tight font-medium">Pick a clear category so customers can find you</p>
</div>
<button class="text-white/80 hover:text-white">
<span class="material-symbols-outlined !text-[14px]">close</span>
</button>
</div>
</div>
<div class="flex flex-wrap gap-2 pt-1.5">
<span class="text-[12px] text-on-surface-variant py-1">Suggested:</span>
<button class="bg-secondary-container text-primary font-semibold text-[12px] px-3 py-1 rounded-full flex items-center gap-1.5 hover:brightness-95 active:scale-95 transition-all">
<span class="material-symbols-outlined !text-[14px]">auto_awesome</span>
                        Cafe &amp; Tea
                    </button>
</div>
</div>
</div>
<div class="space-y-1.5">
<label class="font-jakarta text-label-md text-on-surface-variant px-1">Description</label>
<textarea class="w-full px-4 py-3 rounded-xl border-outline-variant border focus:border-primary focus:ring-0 text-body-lg bg-white transition-all resize-none" placeholder="Tell your customers about your business..." rows="3"></textarea>
</div>
<div class="space-y-1.5">
<label class="font-jakarta text-label-md text-on-surface-variant px-1">Business Hours</label>
<div class="w-full px-4 py-3 rounded-xl border border-outline-variant flex items-center justify-between bg-white cursor-pointer hover:bg-surface-container-low transition-colors">
<span class="text-on-surface text-body-md">Closed on Sundays • 9 AM - 8 PM</span>
<span class="material-symbols-outlined text-on-surface-variant">schedule</span>
</div>
</div>
<div class="space-y-1.5">
<label class="font-jakarta text-label-md text-on-surface-variant px-1">Business Address</label>
<div class="w-full px-4 py-3 rounded-xl border border-outline-variant flex items-center gap-3 bg-white">
<span class="material-symbols-outlined text-on-surface-variant">location_on</span>
<input class="flex-1 bg-transparent border-none focus:ring-0 p-0 text-body-md placeholder:text-on-surface-variant/50" placeholder="Add business address" type="text"/>
</div>
</div>
</div>
<div class="h-20"></div>
</main>
<div class="fixed bottom-0 left-0 w-full bg-white border-t border-outline-variant px-4 py-4 z-40">
<button class="w-full bg-primary text-white font-jakarta text-lg font-bold py-3.5 rounded-xl shadow-md hover:brightness-110 active:scale-[0.98] transition-all">
        Save &amp; Continue
    </button>
</div>
</body></html>
