<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>WhatsApp Business - Add Product</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .spotlight-pulse {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(7, 94, 84, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(7, 94, 84, 0); }
            100% { box-shadow: 0 0 0 0 rgba(7, 94, 84, 0); }
        }
        .glass-blur {
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.85);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-bounce-subtle {
            animation: float 3s ease-in-out infinite;
        }
        /* Custom color override for the requested brand green */
        .bg-whatsapp-dark { background-color: #075E54; }
        .text-whatsapp-dark { color: #075E54; }
        .border-whatsapp-dark { border-color: #075E54; }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#3c4a3d",
                        "on-surface": "#1a1c1c",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#005322",
                        "on-secondary-container": "#226e63",
                        "tertiary-container": "#63c9b9",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#8cd4c7",
                        "on-error": "#ffffff",
                        "on-secondary-fixed-variant": "#005047",
                        "surface-variant": "#e2e2e2",
                        "surface-bright": "#f9f9f9",
                        "secondary-fixed": "#a8f0e3",
                        "on-tertiary": "#ffffff",
                        "primary-fixed-dim": "#3de273",
                        "inverse-primary": "#3de273",
                        "tertiary-fixed-dim": "#72d8c8",
                        "on-secondary-fixed": "#00201c",
                        "surface": "#f9f9f9",
                        "outline": "#6c7b6b",
                        "on-primary-container": "#005523",
                        "background": "#f9f9f9",
                        "surface-dim": "#dadada",
                        "surface-container-high": "#e8e8e8",
                        "primary-fixed": "#66ff8e",
                        "surface-container-low": "#f3f3f4",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed": "#002109",
                        "primary-container": "#25d366",
                        "on-tertiary-fixed": "#00201c",
                        "on-primary": "#ffffff",
                        "on-background": "#1a1c1c",
                        "inverse-surface": "#2f3131",
                        "inverse-on-surface": "#f0f1f1",
                        "tertiary": "#006b5f",
                        "surface-container-highest": "#e2e2e2",
                        "error-container": "#ffdad6",
                        "secondary": "#1c695f",
                        "on-tertiary-container": "#005249",
                        "error": "#ba1a1a",
                        "primary": "#006d2f",
                        "surface-tint": "#006d2f",
                        "surface-container": "#eeeeee",
                        "outline-variant": "#bbcbb9",
                        "on-tertiary-fixed-variant": "#005047",
                        "tertiary-fixed": "#8ff4e3",
                        "secondary-container": "#a5ede0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "40px",
                        "lg": "24px",
                        "margin-mobile": "16px",
                        "gutter": "16px",
                        "xs": "4px",
                        "md": "16px",
                        "sm": "8px",
                        "base": "4px",
                        "xl": "32px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "label-md": ["Inter"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "headline-lg": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                        "label-md": ["13px", {"lineHeight": "18px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-sm": ["11px", {"lineHeight": "16px", "letterSpacing": "0.03em", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-surface font-body-md text-on-surface antialiased selection:bg-whatsapp-dark/30">
<!-- Fixed Header Section -->
<div class="fixed top-0 left-0 w-full z-50">
<!-- iOS Status Bar -->
<div class="w-full h-11 bg-whatsapp-dark flex items-center justify-between px-6 text-white">
<span class="text-[15px] font-semibold">9:41</span>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[18px]">battery_full</span>
</div>
</div>
<!-- App Bar -->
<header class="w-full h-14 bg-whatsapp-dark flex items-center justify-between px-4 shadow-md">
<div class="flex items-center gap-4">
<button class="p-1 text-white hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-white">Catalog Assistant</h1>
</div>
<div class="flex items-center gap-2 bg-white/10 px-3 py-1.5 rounded-full border border-white/20">
<span class="text-[10px] font-bold text-white uppercase tracking-wider">AI Tips</span>
<div class="w-8 h-4 bg-primary-container rounded-full relative flex items-center px-0.5 cursor-pointer" id="ai-toggle-outer">
<div class="w-3 h-3 bg-white rounded-full ml-auto shadow-sm transition-all duration-200"></div>
</div>
</div>
</header>
</div>
<main class="pt-[110px] pb-[160px] px-margin-mobile max-w-md mx-auto min-h-screen">
<!-- Progress Indicator -->
<div class="mb-lg">
<div class="flex justify-between items-end mb-2">
<span class="font-label-md text-label-md text-on-surface-variant">Product 1 of 3</span>
<span class="font-label-sm text-label-sm text-whatsapp-dark font-bold">33% Complete</span>
</div>
<div class="h-2 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-whatsapp-dark w-1/3 rounded-full transition-all duration-500"></div>
</div>
</div>
<!-- Catalog Form Container -->
<div class="space-y-lg">
<!-- Photo Upload Area with Spotlight -->
<div class="relative group">
<label class="block font-label-md text-label-md mb-2 text-on-surface-variant">Product Images</label>
<div class="grid grid-cols-3 gap-3">
<div class="aspect-square bg-surface-container-low rounded-xl border-2 border-dashed border-outline-variant flex flex-col items-center justify-center text-on-surface-variant cursor-pointer hover:bg-surface-container-high transition-colors spotlight-pulse relative z-10">
<span class="material-symbols-outlined text-3xl mb-1 text-whatsapp-dark">add_a_photo</span>
<span class="text-[10px] font-bold">ADD PHOTO</span>
</div>
<div class="aspect-square bg-surface-container rounded-xl"></div>
<div class="aspect-square bg-surface-container rounded-xl"></div>
</div>
<!-- AI COACH MARK TIP -->
<div class="absolute -right-2 top-12 z-20 w-48 glass-blur p-3 rounded-xl shadow-xl border border-whatsapp-dark/20 animate-bounce-subtle" id="ai-tip">
<div class="flex items-start gap-2">
<div class="mt-0.5 w-5 h-5 flex items-center justify-center bg-whatsapp-dark rounded-full shrink-0">
<span class="material-symbols-outlined text-[14px] text-white" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<p class="text-[11px] leading-relaxed font-medium text-on-surface">
<span class="text-whatsapp-dark font-bold">Pro Tip:</span> Listings with photos get <span class="bg-whatsapp-dark/10 px-1 rounded">2× more orders</span>.
                    </p>
</div>
<!-- Tail -->
<div class="absolute -left-1.5 top-4 w-3 h-3 glass-blur border-l border-b border-whatsapp-dark/20 rotate-45 bg-white"></div>
</div>
</div>
<!-- Product Name -->
<div class="space-y-1.5">
<label class="block font-label-md text-label-md text-on-surface-variant ml-1">Product Name</label>
<input class="w-full bg-white border border-outline-variant rounded-xl px-4 py-4 text-body-lg focus:ring-2 focus:ring-whatsapp-dark focus:border-transparent outline-none transition-all shadow-sm" placeholder="e.g. Masala Chai Blend" type="text" value="Suchi's Special Masala Tea">
</div>
<!-- Price -->
<div class="space-y-1.5">
<label class="block font-label-md text-label-md text-on-surface-variant ml-1">Price (₹)</label>
<input class="w-full bg-white border border-outline-variant rounded-xl px-4 py-4 text-body-lg focus:ring-2 focus:ring-whatsapp-dark focus:border-transparent outline-none transition-all shadow-sm" placeholder="0.00" type="number" value="250">
</div>
<!-- Description with AI Suggestion -->
<div class="space-y-1.5 relative">
<div class="flex justify-between items-center ml-1">
<label class="font-label-md text-label-md text-on-surface-variant">Description</label>
<button class="flex items-center gap-1.5 px-3 py-1.5 bg-whatsapp-dark text-white rounded-full text-[11px] font-bold hover:opacity-90 transition-all shadow-sm active:scale-95">
<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
                    SUGGEST AI DESCRIPTION
                </button>
</div>
<textarea class="w-full bg-white border border-outline-variant rounded-xl px-4 py-3 text-body-md focus:ring-2 focus:ring-whatsapp-dark focus:border-transparent outline-none transition-all shadow-sm resize-none" placeholder="Tell customers about your product..." rows="4">Hand-picked Assam tea leaves blended with aromatic cardamom, cinnamon, and ginger. Perfect for a cozy morning start at Suchi's Tea House.</textarea>
</div>
<!-- Stock Toggle Card -->
<div class="bg-white border border-outline-variant rounded-xl p-4 flex justify-between items-center shadow-sm">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-whatsapp-dark">inventory_2</span>
</div>
<div>
<p class="font-label-md text-label-md text-on-surface">In Stock</p>
<p class="text-[11px] text-on-surface-variant">Available for customers to order</p>
</div>
</div>
<div class="w-12 h-6 bg-primary-container rounded-full relative flex items-center px-1 cursor-pointer">
<div class="w-4 h-4 bg-white rounded-full ml-auto shadow-md"></div>
</div>
</div>
</div>
</main>
<!-- Footer Action -->
<div class="fixed bottom-0 left-0 w-full p-4 bg-white/95 backdrop-blur-md border-t border-outline-variant flex flex-col gap-3 z-40">
<button class="w-full bg-whatsapp-dark text-white font-headline-md text-headline-md py-4 rounded-xl shadow-lg active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
<span class="">Save Product</span>
<span class="material-symbols-outlined">check_circle</span>
</button>
<p class="text-center text-[11px] text-on-surface-variant font-medium pb-2">Your catalog is visible to anyone on WhatsApp.</p>
</div>
<script>
    // AI Toggle interaction
    const aiToggleContainer = document.getElementById('ai-toggle-outer');
    const aiTip = document.getElementById('ai-tip');
    
    if(aiToggleContainer) {
        aiToggleContainer.addEventListener('click', () => {
            const circle = aiToggleContainer.querySelector('div');
            if(circle.classList.contains('ml-auto')) {
                circle.classList.remove('ml-auto');
                circle.classList.add('mr-auto');
                aiToggleContainer.classList.replace('bg-primary-container', 'bg-outline-variant');
                aiTip.style.display = 'none';
            } else {
                circle.classList.remove('mr-auto');
                circle.classList.add('ml-auto');
                aiToggleContainer.classList.replace('bg-outline-variant', 'bg-primary-container');
                aiTip.style.display = 'block';
            }
        });
    }

    // Input focus micro-interactions
    document.querySelectorAll('input, textarea').forEach(el => {
        el.addEventListener('focus', () => {
            el.parentElement.classList.add('scale-[1.01]');
        });
        el.addEventListener('blur', () => {
            el.parentElement.classList.remove('scale-[1.01]');
        });
    });
</script>


</body></html>
