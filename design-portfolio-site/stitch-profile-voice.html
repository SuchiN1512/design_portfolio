<script>
        // Micro-interaction for the mic button
        const micBtn = document.querySelector('.pulse-mic');
        let isListening = true;

        micBtn.addEventListener('click', () => {
            isListening = !isListening;
            const statusLabel = document.querySelector('.animate-pulse');
            
            if (isListening) {
                statusLabel.textContent = 'LISTENING...';
                statusLabel.classList.add('animate-pulse');
                micBtn.classList.add('pulse-mic');
            } else {
                statusLabel.textContent = 'PAUSED';
                statusLabel.classList.remove('animate-pulse');
                micBtn.classList.remove('pulse-mic');
            }
        });
    </script>
