<style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* Custom Waveform Animation */
        @keyframes wave {
            0%, 100% { height: 8px; }
            50% { height: 24px; }
        }
        .wave-bar {
            width: 3px;
            background-color: #25D366;
            border-radius: 2px;
            animation: wave 1.2s ease-in-out infinite;
        }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }

        /* Pulse for Mic Button */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        .mic-pulse::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #25D366;
            animation: pulse-ring 2s infinite;
            z-index: -1;
        }

        /* Glassmorphism utility */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
    </style>

<!-- Micro-interactions Script -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Randomize wave bars slightly for a more natural look
        const bars = document.querySelectorAll('.wave-bar');
        setInterval(() => {
            bars.forEach(bar => {
                const randomHeight = Math.floor(Math.random() * 22) + 8;
                bar.style.height = `${randomHeight}px`;
            });
        }, 120);

        // Simple click feedback for the mic button
        const micBtn = document.querySelector('.mic-pulse button');
        micBtn.addEventListener('click', () => {
            micBtn.style.backgroundColor = '#128C7E';
            setTimeout(() => {
                micBtn.style.backgroundColor = '#25D366';
            }, 300);
        });
    });
</script>
